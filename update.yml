name: Catcast Auto Update

on:
  schedule:
    - cron: '0 */2 * * *'  # каждые 2 часа
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install deps
        run: |
          pip install requests

      - name: ▶️ Run script
        run: python catcast.py

      - name: 💾 Commit & Push
        run: |
          git config --global user.name "bot"
          git config --global user.email "bot@github.com"
          git add catcast.m3u8
          git commit -m "Auto update streams" || echo "No changes"
          git push
